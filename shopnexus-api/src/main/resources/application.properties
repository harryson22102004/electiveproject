# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
shopnexus.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
shopnexus.jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
