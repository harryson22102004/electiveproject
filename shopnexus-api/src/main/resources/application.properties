# Server Configuration
server.port=8080

# Profile selection (default to h2 for immediate runnability)
spring.profiles.active=h2

# ---------------------------------------------------------
# H2 Database Configuration (For Development/Testing)
# ---------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:shopnexusdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------
# MySQL Database Configuration (Uncomment to use MySQL)
# ---------------------------------------------------------
